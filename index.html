<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Netlify CMS Blog</title>
  <link href="https://fonts.googleapis.com/css2?family=Roboto&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Roboto', sans-serif;
      max-width: 800px;
      margin: 40px auto;
      padding: 0 20px;
    }
    h1 {
      font-size: 2.5rem;
      margin-bottom: 0.5em;
    }
    .post {
      border-bottom: 1px solid #ccc;
      margin-bottom: 20px;
      padding-bottom: 10px;
    }
    .post-title {
      font-size: 1.5rem;
      color: #333;
    }
    .post-date {
      font-size: 0.9rem;
      color: #666;
    }
    a.cms-link {
      display: inline-block;
      margin-top: 30px;
      padding: 10px 15px;
      background: #222;
      color: #fff;
      text-decoration: none;
      border-radius: 5px;
    }
  </style>
</head>
<body>

  <h1>Welcome to My Blog</h1>

  <!-- Blog posts will appear here if generated via static site generator -->
  <div class="post">
    <h2 class="post-title">Sample Post</h2>
    <p class="post-date">July 21, 2025</p>
    <p>This is a placeholder blog post. Real posts will show up here if you're using a static site generator like Eleventy, Hugo, or Jekyll to render Markdown from /blog.</p>
  </div>

  <a href="/admin/" class="cms-link">Go to Admin</a>

</body>
</html>
