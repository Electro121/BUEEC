backend:
  name: git-gateway
  branch: master

media_folder: "static/images/uploads"
public_folder: "/images/uploads"

collections:
  - name: "blog"
    label: "Blog"
    folder: "blog"
    create: true
    slug: "{{day}}-{{month}}-{{year}}"
    fields:
      - { label: "Title", name: "title", widget: "string", required: true }
      - { label: "Blog Creator Name", name: "bloggerName", widget: "string", required: true }
